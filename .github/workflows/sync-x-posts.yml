name: Sync X publications

on:
  push:
    branches:
      - main
    paths:
      - scripts/sync-x-posts.mjs
  schedule:
    - cron: "17 13 * * 1"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: sync-x-publications
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch publications from X
        env:
          X_BEARER_TOKEN: ${{ secrets.X_BEARER_TOKEN }}
          X_USERNAME: cisnerosandress
        run: node scripts/sync-x-posts.mjs

      - name: Commit updated publication archive
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/x-posts.json
          if git diff --cached --quiet; then
            echo "No publication changes to commit."
          else
            git commit -m "Sync X publications"
            git push
          fi
